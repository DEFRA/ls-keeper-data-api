  # ═══════════════════════════════════════════════════════════════════
  # SITES
  # ═══════════════════════════════════════════════════════════════════
  /api/sites:
    get:
      tags:
        - site
      summary: Retrieve a list of available sites
      description: Endpoint created to retrieve a list of sites. Parameters can be set to filter by various elements such as Site Identifiers, Site Type, Site Id, Party Id etc. Supports Change Data Capture (CDC) via the lastUpdatedDate parameter.
      operationId: getSites
      parameters:
        - name: siteIdentifier
          in: query
          required: false
          description: Filter by a single site identifier such as CPH Number, FSA No, Port No etc.
          schema:
            type: string
            example: "57/103/2335"
        - name: siteIdentifiers
          in: query
          required: false
          description: Filter by multiple site identifiers (comma-separated). A maximum number of values applies.
          schema:
            type: string
            example: "57/103/2335,57/103/2336"
        - name: type
          in: query
          required: false
          description: |-
            Filter by site type code (comma-separated). Possible site type codes include:
            AC (Assembly Centre), AH (Agricultural Holding), AP (Airport), CA (Calf Collection Centre),
            CC (Collection Centre), CL (Common Land), HA (Haulier), HK (Hunt Kennel),
            KY (Knacker's Yard), LA (Lairage), LR (Laboratory/Research), MA (Market),
            QU (Quarantine), SG (Showground), SM (S/H Both MP & Cs), SP (Seaport),
            SR (Slaughter House Red Meat), ST (Staging Post), SW (Slaughter House White Meat),
            VE (Veterinary Practice), VI (Veterinary Investigation Centre), WP (Wildlife Park), ZO (Zoo).
          schema:
            type: string
            example: "AH,MA"
        - name: siteId
          in: query
          required: false
          description: Filter by a single site ID (UUID).
          schema:
            type: string
            format: uuid
        - name: siteIds
          in: query
          required: false
          description: Filter by multiple site IDs (comma-separated UUIDs). A maximum number of values applies.
          schema:
            type: string
            example: "3fa85f64-5717-4562-b3fc-2c963f66afa6,4fb96e75-6828-5673-c4gd-3d074g77bfb7"
        - name: keeperPartyId
          in: query
          required: false
          description: Filter sites by a keeper party ID (UUID).
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          description: Page number (1-based). Defaults to 1.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          description: Number of records per page. Defaults to 10.
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: order
          in: query
          required: false
          description: The field to order results by. Defaults to name.
          schema:
            type: string
            enum:
              - name
              - type
              - siteidentifier
        - name: sort
          in: query
          required: false
          description: The sort direction. Defaults to asc.
          schema:
            type: string
            enum:
              - asc
              - desc
        - name: lastUpdatedDate
          in: query
          required: false
          description: Returns only Sites that have been updated since this timestamp (inclusive). This is the key parameter for Change Data Capture (CDC).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK - Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    description: Number of items on the current page
                  totalCount:
                    type: integer
                    description: Total number of items across all pages
                  values:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  totalPages:
                    type: integer
                  hasNextPage:
                    type: boolean
                  hasPreviousPage:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/sites/{id}:
    get:
      tags:
        - site
      summary: Retrieve a site's detailed information.
      description: The endpoint returns an object containing the requested site's full detailed information, including location, identifiers, parties, species, marks, and activities.
